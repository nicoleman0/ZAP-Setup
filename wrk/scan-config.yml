env:
  contexts:
    - name: "Link-ZAP-Scanner"
      urls:
        - "https://target-app.com"
      includePaths:
        - "https://target-app.com/.*"
      excludePaths:
        - "https://target-app.com/logout.*"
        - "https://target-app.com/api/auth/signout.*"
        - ".*\\.pdf"
        - ".*\\.zip"
      
      authentication:
        method: "form"
        parameters:
          loginPageUrl: "https://target-app.com/login"
          loginRequestUrl: "https://target-app.com/api/login"
          # Uses the environment variables defined in docker-compose
          loginRequestBody: "username=${ZAP_AUTH_USER}&password=${ZAP_AUTH_PW}"
        verification:
          method: "response"
          loggedOutRegex: 'href="/login"' 
          pollFrequency: 60
      
      sessionManagement:
        method: "cookie"
        parameters: {}
      
      users:
        - name: "test-user"
          credentials:
            username: "${ZAP_AUTH_USER}"
            password: "${ZAP_AUTH_PW}"

  parameters:
    failOnError: true
    failOnWarning: false
    continueOnFailure: false

jobs:
  - type: passiveScan-config
    parameters:
      maxAlertsPerRule: 10
      scanOnlyInScope: true

  - type: spider
    parameters:
      context: "Link-ZAP-Scanner"
      user: "test-user"
      maxDuration: 10 

  - type: ajaxSpider
    parameters:
      context: "Link-ZAP-Scanner"
      user: "test-user"
      browserId: "firefox-headless"
      maxDuration: 15
      maxCrawlDepth: 10
      numberOfBrowsers: 2

  - type: passiveScan-wait
    parameters:
      maxDuration: 5

  - type: activeScan
    parameters:
      context: "Link-ZAP-Scanner"
      user: "test-user"
      policy: "Default Policy"
      maxRuleDurationInMins: 2
      maxScanDurationInMins: 60
      addQueryParam: true

  - type: report
    parameters:
      template: "modern-red-confidential"
      reportDir: "/zap/wrk/reports"
      reportFile: "work-app-security-report"
