env:
  contexts:
    - name: "Link-ZAP-Scanner"
      urls:
        - "https://your-target-app.com"
      includePaths:
        - "https://your-target-app.com/.*"
      excludePaths:
        - "https://your-target-app.com/logout.*"
        - "https://your-target-app.com/api/auth/signout.*"
        - ".*\.pdf"
        - ".*\.zip"
  parameters:
    failOnError: true
    failOnWarning: false
    continueOnFailure: false

jobs:
  - type: passiveScan-config
    parameters:
      maxAlertsPerRule: 10
      scanOnlyInScope: true

  - type: spider
    parameters:
      context: "Link-ZAP-Scanner"
      maxDuration: 5

  - type: ajaxSpider
    parameters:
      context: "Link-ZAP-Scanner"
      browserId: "firefox-headless"
      maxDuration: 10
      maxCrawlDepth: 10
      numberOfBrowsers: 2

  - type: passiveScan-wait      # Ensures all background passive checks finish before attacking
    parameters:
      maxDuration: 5

  - type: activeScan
    parameters:
      context: "Link-ZAP-Scanner"
      policy: "Default Policy"   # Can create custom policies for faster scans
      maxRuleDurationInMins: 2    # Prevents "stuck" attack rules
      maxScanDurationInMins: 60
      addQueryParam: true        # Thoroughly tests URL parameters

  - type: report
    parameters:
      template: "modern-red-confidential"
      reportDir: "/zap/wrk/reports"
      reportFile: "work-app-security-report"
