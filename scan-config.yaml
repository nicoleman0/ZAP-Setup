env:
  contexts:
    - name: "Link-ZAP-Scanner"
      urls:
        - "https://your-target-app.com"
      includePaths:
        - "https://your-target-app.com/.*"
      excludePaths:
        - "https://your-target-app.com/logout.*"
        - "https://your-target-app.com/api/auth/signout.*"
        - ".*\.pdf"  # Exclude heavy files the AJAX spider shouldn't "read"
        - ".*\.zip"
  parameters:
    failOnError: true
    failOnWarning: false
    continueOnFailure: false

jobs:
  - type: spider
    parameters:
      context: "Link-ZAP-Scanner"
      maxDuration: 5

  - type: ajaxSpider
    parameters:
      context: "Link-ZAP-Scanner"
      browserId: "firefox-headless"  # Best for Ubuntu 24.04 Docker
      maxDuration: 10                # Prevents infinite loops in SPAs
      maxCrawlDepth: 10
      numberOfBrowsers: 2            # Adjust based on your 8-core CPU
